name: Auto Bugfix Analyzer & PR Creator

on:
  create:
    branches:
      - 'bugfix/**'
      - 'bugfix-*'
      - 'bug/*'
      - 'fix/*'

jobs:
  analyze-and-fix:
    name: Analyze Bug & Apply Fix
    runs-on: ubuntu-latest
    # Only run on branch creation events (not tags)
    if: github.event.ref_type == 'branch'

    permissions:
      contents: write
      pull-requests: write

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout the newly created bugfix branch
      # ─────────────────────────────────────────────
      - name: Checkout bugfix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.ref }}
          fetch-depth: 0          # Full history needed for diff against main

      # ─────────────────────────────────────────────
      # 2. Set up Python (adjust version as needed)
      # ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─────────────────────────────────────────────
      # 3. Install Anthropic SDK
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install anthropic

      # ─────────────────────────────────────────────
      # 4. Collect changed / new files vs main
      # ─────────────────────────────────────────────
      - name: Collect changed files
        id: changed
        run: |
          git fetch origin main
          # List files that differ between main and this branch
          CHANGED=$(git diff --name-only origin/main...HEAD \
                    -- '*.py' '*.js' '*.ts' '*.jsx' '*.tsx' \
                       '*.java' '*.go' '*.rb' '*.php' '*.cs' \
                    | head -30)          # safety cap – first 30 files
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED"   >> $GITHUB_OUTPUT
          echo "EOF"         >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$CHANGED"

      # ─────────────────────────────────────────────
      # 5. Read source files & call Claude API
      # ─────────────────────────────────────────────
      - name: Analyze code and generate patch
        id: analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRANCH_NAME: ${{ github.event.ref }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          python3 << 'PYEOF'
          import os, json, subprocess, sys
          import anthropic

          branch   = os.environ["BRANCH_NAME"]
          raw_list = os.environ.get("CHANGED_FILES", "").strip()
          files    = [f for f in raw_list.splitlines() if f.strip()]

          if not files:
              print("No source files changed vs main – skipping analysis.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write("patch_created=false\n")
                  fh.write("summary=No source files found to analyse.\n")
              sys.exit(0)

          # ── Build a prompt with all file contents ──────────────────────
          file_blocks = []
          for path in files:
              if not os.path.isfile(path):
                  continue
              try:
                  content = open(path).read()
              except Exception:
                  continue
              file_blocks.append(f"### File: {path}\n```\n{content}\n```")

          if not file_blocks:
              print("Could not read any changed files.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write("patch_created=false\n")
                  fh.write("summary=Could not read changed files.\n")
              sys.exit(0)

          prompt = f"""You are an expert software engineer performing a code review on branch `{branch}`.

          The following source files were changed or added on this bugfix branch:

          {chr(10).join(file_blocks)}

          Tasks:
          1. Identify bugs, logic errors, security issues, or code quality problems.
          2. Produce a **unified diff patch** (git diff format) that fixes every issue found.
             - The patch MUST be directly applicable with `git apply`.
             - Only change what is necessary to fix the bugs.
          3. Write a concise plain-text summary (≤ 200 words) of what was found and fixed.

          Respond ONLY with a JSON object – no markdown fences, no extra text:
          {{
            "patch": "<unified diff string or empty string if no fix needed>",
            "summary": "<plain text summary>"
          }}
          """

          client = anthropic.Anthropic()
          message = client.messages.create(
              model="claude-sonnet-4-20250514",
              max_tokens=4096,
              messages=[{"role": "user", "content": prompt}]
          )

          raw = message.content[0].text.strip()
          # Strip accidental markdown fences
          if raw.startswith("```"):
              raw = "\n".join(raw.splitlines()[1:])
          if raw.endswith("```"):
              raw = "\n".join(raw.splitlines()[:-1])

          result = json.loads(raw)
          patch   = result.get("patch", "").strip()
          summary = result.get("summary", "No summary provided.").strip()

          print("=== Claude Summary ===")
          print(summary)

          gho = os.environ["GITHUB_OUTPUT"]
          # Escape multiline for GITHUB_OUTPUT
          with open(gho, "a") as fh:
              fh.write(f"summary<<SUMMARY_EOF\n{summary}\nSUMMARY_EOF\n")

          if patch:
              with open("claude_fix.patch", "w") as pf:
                  pf.write(patch)
              print("\n=== Patch written to claude_fix.patch ===")
              with open(gho, "a") as fh:
                  fh.write("patch_created=true\n")
          else:
              print("No patch generated (no fixes required).")
              with open(gho, "a") as fh:
                  fh.write("patch_created=false\n")
          PYEOF

      # ─────────────────────────────────────────────
      # 6. Apply the patch (if one was generated)
      # ─────────────────────────────────────────────
      - name: Apply patch
        if: steps.analyze.outputs.patch_created == 'true'
        run: |
          echo "Applying claude_fix.patch …"
          git apply --whitespace=fix claude_fix.patch
          echo "Patch applied successfully."

      # ─────────────────────────────────────────────
      # 7. Commit the fix back to the bugfix branch
      # ─────────────────────────────────────────────
      - name: Commit fix
        if: steps.analyze.outputs.patch_created == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: apply AI-generated bugfix patch [skip ci]

          Branch  : ${{ github.event.ref }}
          Trigger : auto-bugfix workflow
          "
          git push origin HEAD:${{ github.event.ref }}

      # ─────────────────────────────────────────────
      # 8. Create Pull Request → main
      # ─────────────────────────────────────────────
      - name: Create Pull Request
        if: steps.analyze.outputs.patch_created == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ github.event.ref }}
          title: "🐛 [Auto-Fix] ${{ github.event.ref }}"
          body: |
            ## Automated Bugfix PR

            **Branch:** `${{ github.event.ref }}`
            **Triggered by:** Branch creation event
            **Fixed by:** Claude AI (claude-sonnet-4-20250514)

            ---

            ### Analysis & Fix Summary

            ${{ steps.analyze.outputs.summary }}

            ---

            ### Review Checklist
            - [ ] Verify the patch logic is correct
            - [ ] Run the test suite locally
            - [ ] Check for edge cases not covered by the fix
            - [ ] Approve and merge when satisfied

            > ⚠️ This PR was created automatically. Always review AI-generated fixes before merging.
          labels: |
            bugfix
            ai-generated
            needs-review
          draft: false

      # ─────────────────────────────────────────────
      # 9. Create informational PR when no fix needed
      # ─────────────────────────────────────────────
      - name: Create PR (no fix needed)
        if: steps.analyze.outputs.patch_created == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ github.event.ref }}
          title: "🐛 ${{ github.event.ref }}"
          body: |
            ## Bugfix PR

            **Branch:** `${{ github.event.ref }}`

            ---

            ### AI Analysis Result

            ${{ steps.analyze.outputs.summary }}

            > ℹ️ The AI analyser found no automatic fixes to apply. Manual review is recommended.
          labels: |
            bugfix
            needs-review
          draft: true
