name: Bugfix Branch — Jira Fetch & Gemini Auto-Fix

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Bugfix branch name (e.g. bugfix/MOB-29)"
        required: false
        default: "bugfix/MOB-29"
  push:
    branches:
      - "bugfix/**"

jobs:
  gemini-autofix:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # push the fix commit
      pull-requests: write   # open the PR

    steps:
      # ── 1. Resolve branch name ─────────────────────────────────────────────
      # For workflow_dispatch: use the input; for push: use the pushed branch
      - name: Resolve branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ github.event.inputs.branch_name }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "✅ Branch resolved: $BRANCH"

      # ── 2. Checkout ────────────────────────────────────────────────────────
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 0

      # ── 3. Parse ticket number from branch name ────────────────────────────
      - name: Extract Jira ticket ID
        id: ticket
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          TICKET="${BRANCH#bugfix/}"                # strip prefix → MOB-29

          if [[ ! "$TICKET" =~ ^[A-Z]+-[0-9]+$ ]]; then
            echo "::error::Branch '$BRANCH' does not contain a valid Jira ticket (expected bugfix/PROJ-123)"
            exit 1
          fi

          echo "id=$TICKET" >> "$GITHUB_OUTPUT"
          echo "✅ Ticket extracted: $TICKET"

      # ── 4. Fetch Jira ticket description ───────────────────────────────────
      - name: Fetch Jira ticket
        id: jira
        env:
          JIRA_BASE_URL:  ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TICKET_ID:      ${{ steps.ticket.outputs.id }}
        run: |
          RESPONSE=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/$TICKET_ID")

          # Bail out if the ticket wasn't found
          if echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if 'fields' in d else 1)"; then
            echo "✅ Ticket fetched"
          else
            echo "::error::Could not fetch Jira ticket '$TICKET_ID'. Response: $RESPONSE"
            exit 1
          fi

          SUMMARY=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['fields']['summary'])")
          DESCRIPTION=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)['fields'].get('description') or {}
          def extract(node):
              if isinstance(node, str): return node
              if isinstance(node, dict):
                  if node.get('type') == 'text': return node.get('text', '')
                  return ''.join(extract(c) for c in node.get('content', []))
              if isinstance(node, list): return ''.join(extract(i) for i in node)
              return ''
          print(extract(d))
          ")

          echo "── Jira Summary ──────────────────────────────"
          echo "$SUMMARY"
          echo "── Jira Description ──────────────────────────"
          echo "$DESCRIPTION"

          # Pass to subsequent steps via outputs (safe multi-line export)
          {
            echo "summary<<EOF_SUMMARY"
            echo "$SUMMARY"
            echo "EOF_SUMMARY"
            echo "description<<EOF_DESCRIPTION"
            echo "$DESCRIPTION"
            echo "EOF_DESCRIPTION"
          } >> "$GITHUB_OUTPUT"

      # ── 5. Set up Python ───────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-generativeai PyGithub

      # ── 6. Run Gemini & open PR ────────────────────────────────────────────
      - name: Gemini — generate fix & open PR
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:       ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          REPO:               ${{ github.repository }}
          BASE_BRANCH:        ${{ github.event.repository.default_branch }}
          HEAD_BRANCH:        ${{ steps.branch.outputs.name }}
          TICKET_ID:          ${{ steps.ticket.outputs.id }}
          JIRA_BASE_URL:      ${{ secrets.JIRA_BASE_URL }}
          TICKET_SUMMARY:     ${{ steps.jira.outputs.summary }}
          TICKET_DESCRIPTION: ${{ steps.jira.outputs.description }}
        run: python scripts/gemini_autofix.py